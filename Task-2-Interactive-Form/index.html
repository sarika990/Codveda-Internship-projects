<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A highly interactive, state-of-the-art registration form built with premium Claymorphism design elements and real-time JavaScript client-side validation.">
    <title>Interactive Registration Form | Claymorphism UX</title>
    
    <!-- Google Fonts: Outfit for sleek, modern typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- External Claymorphism Styling -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Ambient Claymorphism Floating Background Shapes -->
    <div class="ambient-shape shape-1" aria-hidden="true"></div>
    <div class="ambient-shape shape-2" aria-hidden="true"></div>

    <div class="form-container">
        
        <!-- Registration Form Panel -->
        <form id="registration-form" novalidate>
            <div class="form-header">
                <h1>Join the Future</h1>
                <p>Register your account with ease.</p>
            </div>

            <!-- Full Name Input Group -->
            <div class="form-group" id="group-name">
                <label for="name-input">Full Name</label>
                <div class="input-wrapper">
                    <input 
                        type="text" 
                        id="name-input" 
                        placeholder="John Doe" 
                        autocomplete="name"
                        required
                    >
                    <span class="feedback-icon" aria-hidden="true">✓</span>
                </div>
                <small class="error-message" id="error-name" aria-live="polite"></small>
            </div>

            <!-- Email Address Input Group -->
            <div class="form-group" id="group-email">
                <label for="email-input">Email Address</label>
                <div class="input-wrapper">
                    <input 
                        type="email" 
                        id="email-input" 
                        placeholder="john@example.com" 
                        autocomplete="email"
                        required
                    >
                    <span class="feedback-icon" aria-hidden="true">✓</span>
                </div>
                <small class="error-message" id="error-email" aria-live="polite"></small>
            </div>

            <!-- Phone Number Input Group -->
            <div class="form-group" id="group-phone">
                <label for="phone-input">Phone Number</label>
                <div class="input-wrapper">
                    <input 
                        type="tel" 
                        id="phone-input" 
                        placeholder="1234567890" 
                        autocomplete="tel"
                        required
                    >
                    <span class="feedback-icon" aria-hidden="true">✓</span>
                </div>
                <small class="error-message" id="error-phone" aria-live="polite"></small>
            </div>

            <!-- Password Input Group -->
            <div class="form-group" id="group-password">
                <label for="password-input">Password</label>
                <div class="input-wrapper">
                    <input 
                        type="password" 
                        id="password-input" 
                        placeholder="••••••••" 
                        autocomplete="new-password"
                        required
                    >
                    <span class="feedback-icon" aria-hidden="true">✓</span>
                </div>
                <small class="error-message" id="error-password" aria-live="polite"></small>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="submit-btn">Create Account</button>
        </form>

        <!-- Success Confirmation Panel (Hidden initially) -->
        <div id="success-confirmation" class="success-panel" aria-live="assertive">
            <div class="success-icon-container">
                <!-- Checkmark SVG Icon -->
                <svg viewBox="0 0 24 24">
                    <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
                </svg>
            </div>
            <h2>Account Created!</h2>
            <p>Welcome! Your account has been successfully registered. You are ready to explore our premium dashboard experience.</p>
            <button type="button" id="reset-form-btn" class="reset-btn">Register Another Account</button>
        </div>

    </div>

    <!-- External Validation Logic -->
    <script src="script.js"></script>
</body>
</html>
